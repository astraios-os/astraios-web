<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Astraios — Astra AI OS</title>
<meta name="description" content="Astraios — an AI operating system for your life. Written in the stars. Coming soon." />
<meta name="robots" content="index,follow" />
<!-- Open Graph -->
<meta property="og:title" content="Astraios — Astra AI OS" />
<meta property="og:description" content="An AI operating system for your life. Coming soon." />
<meta property="og:type" content="website" />
<style>
  :root{
    --bg:#05060d; --bg2:#0a0d1c; --ink:#eef2ff; --muted:#8b93b8;
    --gold:#f5c451; --signal:#5fd0e6; --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
    color:var(--ink); background:radial-gradient(ellipse 80% 60% at 50% -10%, #16204a 0%, var(--bg2) 40%, var(--bg) 100%);
    min-height:100%; overflow-x:hidden; display:flex; flex-direction:column;
  }
  /* starfield */
  .stars,.stars2{position:fixed;inset:0;pointer-events:none;background-repeat:repeat}
  .stars{background-image:
    radial-gradient(1px 1px at 20% 30%, #fff, transparent),
    radial-gradient(1px 1px at 70% 60%, #cfe3ff, transparent),
    radial-gradient(1.5px 1.5px at 40% 80%, #fff, transparent),
    radial-gradient(1px 1px at 85% 15%, #fff, transparent),
    radial-gradient(1px 1px at 55% 45%, #bcd0ff, transparent);
    background-size:600px 600px; opacity:.5; animation:drift 240s linear infinite}
  .stars2{background-image:
    radial-gradient(1px 1px at 10% 70%, #fff, transparent),
    radial-gradient(1px 1px at 90% 40%, #fff, transparent),
    radial-gradient(1px 1px at 30% 20%, #e8f0ff, transparent);
    background-size:400px 400px; opacity:.35; animation:drift 360s linear infinite reverse}
  @keyframes drift{from{transform:translateY(0)}to{transform:translateY(-600px)}}
  @media (prefers-reduced-motion: reduce){.stars,.stars2{animation:none}}

  main{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6vh 24px}
  .mark{font-size:14px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;padding-left:.5em}
  h1{font-size:clamp(44px,9vw,96px);font-weight:800;letter-spacing:-.02em;line-height:1;
     background:linear-gradient(180deg,#fff 0%,#cdd6ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{margin-top:18px;color:var(--muted);font-size:clamp(15px,2.4vw,20px);max-width:640px}
  .tag b{color:var(--ink);font-weight:600}
  .lore{margin-top:10px;color:rgba(245,196,81,.75);font-style:italic;font-size:14px;letter-spacing:.04em}

  form{margin-top:40px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:460px}
  input[type=email]{flex:1;min-width:220px;padding:14px 16px;border-radius:12px;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:var(--ink);font-size:16px;outline:none}
  input[type=email]:focus{border-color:var(--signal)}
  button{padding:14px 22px;border-radius:12px;border:0;background:var(--gold);color:#1a1300;font-weight:700;font-size:15px;cursor:pointer;transition:transform .15s,box-shadow .15s}
  button:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(245,196,81,.25)}
  .note{margin-top:14px;color:var(--muted);font-size:12px}
  footer{position:relative;z-index:2;text-align:center;padding:24px;color:rgba(139,147,184,.6);font-size:12px;border-top:1px solid var(--line)}
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>

  <main>
    <div class="mark">Astra · AI · OS</div>
    <h1>ASTRAIOS</h1>
    <p class="tag">An AI <b>operating system</b> for your life — not a chatbot. Private, always‑on, yours.</p>
    <p class="lore">ἀστραῖος — of the stars.</p>

    <!-- TODO: point `action` at your newsletter/form provider (beehiiv / Substack / Buttondown / Formspree).
         Until then this is a non-functional placeholder. -->
    <form action="#" method="post" onsubmit="this.querySelector('.note')||0;return true;">
      <input type="email" name="email" placeholder="you@email.com" aria-label="Email" required />
      <button type="submit">Follow the build</button>
    </form>
    <p class="note">Join the waitlist — the story of building Astraios, from the ground up.</p>
  </main>

  <footer>© 2026 Astraios · astraios.net</footer>
</body>
</html>
